name: app
description: ""
publish_to: "none"
version: 1.0.0
resolution: workspace

environment:
  sdk: ^3.10.4

dependencies:
  flutter_localizations:
    sdk: flutter
  flutter:
    sdk: flutter

  code_analyzer: ^0.0.1
  common: ^0.0.1
  domain: ^0.0.1
  data: ^0.0.1
  entity: ^0.0.1
  designsystem: ^0.0.1
  ui: ^0.0.1
  navigation: ^0.0.1
  app_locale: ^1.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  dart_code_linter: ^4.0.2
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

  config:
    enable-lldb-debugging: false
