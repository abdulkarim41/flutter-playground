name: flutter_playground

workspace:
  - app/

environment:
  sdk: ^3.10.4

dev_dependencies:
  melos: ^7.1.0
  flutter_test:
    sdk: flutter



flutter:

  uses-material-design: true

melos:
  command:
    bootstrap:
      environment:
        sdk: ^3.10.4

      dependencies:
        cupertino_icons: ^1.0.8

      dev_dependencies:
        flutter_test:
          sdk: flutter
        flutter_lints: ^6.0.0
        melos: ^6.3.3

  scripts:
    clean_and_get:
      run: melos exec -- flutter clean && melos bootstrap
      description: Cleans and then fetches dependencies for all packages.

    generate:barrels:
      run: dart run melos_scripts/barrel_generator.dart
      description: Update all package barrel files
