name: flutter_playground

workspace:
  - app/
  - core/common/
  - core/designsystem/
  - core/locale/
  - core/data/
  - core/domain/
  - core/navigation/
  - model/apiresponse/
  - model/entity/
  - tooling/secreat_env/
  - tooling/code_analyzer/

environment:
  sdk: ^3.10.4

dev_dependencies:
  melos: ^7.1.0

melos:
  command:
    bootstrap:
      environment:
        sdk: ^3.10.4

      dependencies:
        common: ^0.0.1
        data: ^0.0.1
        domain: ^0.0.1

        cupertino_icons: ^1.0.8
        logger: ^2.6.1

      dev_dependencies:
        flutter_test:
          sdk: flutter
        flutter_lints: ^6.0.0
        melos: ^6.3.3

  scripts:
    clean_and_get:
      run: melos exec -- flutter clean && melos bootstrap
      description: Cleans and then fetches dependencies for all packages.

    generate:barrels:
      run: dart run melos_scripts/barrel_generator.dart
      description: Update all package barrel files

    env_secret_generate:
      run: melos exec --scope secret_env -- dart run build_runner build
