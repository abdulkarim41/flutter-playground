name: flutter_playground

workspace:
  - app/
  - core/common/
  - core/designsystem/
  - core/ui/
  - core/locale/
  - core/data/
  - core/domain/
  - core/navigation/
  - model/apiresponse/
  - model/entity/
  - tooling/secreat_env/
  - tooling/code_analyzer/

environment:
  sdk: ^3.10.4

dev_dependencies:
  melos: ^7.1.0

melos:
  command:
    bootstrap:
      environment:
        sdk: ^3.10.4

      dependencies:
        code_analyzer: ^0.0.1
        common: ^0.0.1
        data: ^0.0.1
        domain: ^0.0.1
        designsystem: ^0.0.1
        navigation: ^0.0.1
        entity: ^0.0.1
        ui: ^0.0.1

        flutter_bloc: ^9.1.1
        get_it: ^9.2.1
        cupertino_icons: ^1.0.9
        shared_preferences: ^2.5.5
        equatable: ^2.0.8
        flutter_svg: ^2.2.4
        formz: ^0.8.0
        http: ^1.6.0
        jiffy: ^6.4.4
        fluttertoast: ^9.0.0
        image_picker: ^1.2.1
        url_launcher: ^6.3.2
        webview_flutter: ^4.13.1
        json_annotation: ^4.11.0
        envied: ^1.3.4
        flutter_local_notifications: ^21.0.0
        freezed_annotation: ^3.1.0
        carousel_slider: ^5.1.2
        flutter_screenutil: ^5.9.3
        lottie: ^3.3.3
        font_awesome_flutter: ^11.0.0
        flutter_widget_from_html: ^0.17.2
        logger: ^2.7.0
        yaml_edit: ^2.2.4
        go_router: ^17.2.0
        background_downloader: ^9.5.4
        flutter_html: ^3.0.0
        google_maps_flutter: ^2.17.0
        firebase_core: ^4.6.0
        firebase_messaging: ^16.2.0
        firebase_crashlytics: ^5.2.0
        firebase_analytics: ^12.3.0
        facebook_app_events: ^0.27.0
        #firebase_remote_config: ^6.1.2
        cached_network_image: ^3.4.1
        flutter_secure_storage: ^9.2.4
        package_info_plus: ^9.0.0
        flutter_image_compress: ^2.4.0
        path: ^1.9.1
        path_provider: ^2.1.5
        sqflite: ^2.4.2

      dev_dependencies:
        flutter_test:
          sdk: flutter
        flutter_lints: ^6.0.0
        dart_code_linter: ^4.0.2
        json_serializable: ^6.13.1
        build_runner: ^2.13.1
        envied_generator: ^1.3.4
        melos: ^6.3.3

  scripts:
    clean_and_get:
      run: melos exec -- flutter clean && melos bootstrap
      description: Cleans and then fetches dependencies for all packages.

    # Production APK builds
    build:apk:production:release:
      run: melos exec --scope="app" -- flutter build apk --target=lib/application/main_production.dart --flavor production --release
      description: Build production APK (release mode)

    # Development APK builds
    build:apk:development:release:
      run: melos exec --scope="app" -- flutter build apk --target=lib/application/main_development.dart --flavor development --release
      description: Build development APK (release mode)

    generate:barrels:
      run: dart run melos_scripts/barrel_generator.dart
      description: Update all package barrel files

    env_secret_generate:
      run: melos exec --scope secret_env -- dart run build_runner build

    update_overrides:
      run: melos exec -- dart run $(pwd)/scripts/pubspec_overrides.dart && melos bootstrap

    update_minor_deps:
      description: Update minor dependencies
      run: dart run scripts/update_melos_minor_deps.dart

    update_major_deps:
      description: Update major dependencies
      run: dart run scripts/update_melos_major_deps.dart
